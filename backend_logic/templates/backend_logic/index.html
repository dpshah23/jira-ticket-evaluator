<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jira Ticket Evaluator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6; /* Tailwind blue-500 */
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <div class="max-w-4xl mx-auto py-10 px-4">
        <!-- Header -->
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">AI Jira Ticket Evaluator <span class="text-blue-600">Agents</span></h1>
            <p class="mt-3 text-lg text-gray-600">Automating Pull Request Compliance with Model Context Protocol (MCP)</p>
        </header>

        <!-- Main Form Card -->
        <div class="bg-white rounded-2xl shadow-xl p-8 mb-10 border border-gray-100">
            <form id="evaluator-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Jira ID -->
                    <div>
                        <label for="jira_id" class="block text-sm font-semibold text-gray-700 mb-2">Jira Ticket ID</label>
                        <input type="text" id="jira_id" name="jira_id" placeholder="e.g. PROJ-123" required
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    </div>
                    
                    <!-- GitHub Repo -->
                    <div>
                        <label for="github_repo" class="block text-sm font-semibold text-gray-700 mb-2">GitHub Repository</label>
                        <input type="text" id="github_repo" name="github_repo" placeholder="e.g. org/repo" required
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    </div>

                    <!-- GitHub PR -->
                    <div>
                        <label for="github_pr" class="block text-sm font-semibold text-gray-700 mb-2">Pull Request #</label>
                        <input type="number" id="github_pr" name="github_pr" placeholder="e.g. 42" required min="1"
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    </div>
                </div>

                <div class="flex items-center justify-end mt-6">
                    <button type="submit" id="submit-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg hover:shadow-xl transition-all flex items-center gap-2">
                        <span>Evaluate PR</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707l-3-3a1 1 0 00-1.414 1.414L10.586 9H7a1 1 0 100 2h3.586l-1.293 1.293a1 1 0 101.414 1.414l3-3a1 1 0 000-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                    <!-- Loader -->
                    <div id="loading" class="hidden ml-4 flex items-center text-blue-600 font-medium">
                        <div class="loader mr-3"></div> Analyzing Context...
                    </div>
                </div>
            </form>
        </div>

        <!-- Error Message -->
        <div id="error-container" class="hidden bg-red-50 border-l-4 border-red-500 p-4 mb-8 rounded-r-lg">
            <div class="flex">
                <div class="flex-shrink-0">
                    <svg class="h-5 w-5 text-red-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                    </svg>
                </div>
                <div class="ml-3">
                    <h3 class="text-sm font-medium text-red-800" id="error-text"></h3>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <div id="results-container" class="hidden space-y-8">
            <!-- Verdict Banner -->
            <div id="verdict-banner" class="rounded-xl shadow-md p-6 border-2 flex items-center justify-between">
                <div>
                    <h2 class="text-gray-500 font-semibold uppercase tracking-wider text-sm mb-1">Final Verdict</h2>
                    <div class="text-3xl font-black capitalize" id="verdict-text"></div>
                </div>
                <div id="verdict-icon"></div>
            </div>

            <!-- Details Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Reasoning (Spans 2 columns) -->
                <div class="lg:col-span-2 bg-white rounded-xl shadow-md p-6 border border-gray-100">
                    <h3 class="text-lg font-bold text-gray-900 border-b pb-3 mb-4 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-purple-500" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                        </svg>
                        Agent Reasoning
                    </h3>
                    <p class="text-gray-700 leading-relaxed" id="reasoning-text"></p>
                </div>

                <!-- Context metadata -->
                <div class="bg-gray-50 rounded-xl p-6 border border-gray-200 h-fit">
                    <h3 class="text-lg font-bold text-gray-900 border-b pb-3 mb-4">Context Evaluated</h3>
                    <ul class="space-y-3 text-sm">
                        <li>
                            <span class="font-semibold text-gray-600 block">Jira Ticket</span>
                            <span id="meta-jira" class="text-gray-900 font-medium"></span>
                        </li>
                        <li>
                            <span class="font-semibold text-gray-600 block">PR Title</span>
                            <span id="meta-pr-title" class="text-gray-900 font-medium"></span>
                        </li>
                        <li>
                            <span class="font-semibold text-gray-600 block">Files Modified</span>
                            <span id="meta-files-count" class="text-blue-600 font-bold bg-blue-100 px-2 py-0.5 rounded"></span>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Code Evidence -->
            <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100">
                <h3 class="text-lg font-bold text-gray-900 border-b pb-3 mb-4 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-green-500" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M2 5a2 2 0 012-2h12a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V5zm3.293 1.293a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 01-1.414-1.414L7.586 10 5.293 7.707a1 1 0 010-1.414zM11 12a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd" />
                    </svg>
                    Code Evidence
                </h3>
                <div id="evidence-list" class="space-y-4">
                    <!-- Populated by JS -->
                </div>
            </div>

        </div>
    </div>

    <!-- Frontend Logic -->
    <script>
        document.getElementById('evaluator-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI elements
            const btn = document.getElementById('submit-btn');
            const loader = document.getElementById('loading');
            const resultsContainer = document.getElementById('results-container');
            const errorContainer = document.getElementById('error-container');
            const errorText = document.getElementById('error-text');
            
            // Form values
            const jiraId = document.getElementById('jira_id').value;
            const githubRepo = document.getElementById('github_repo').value;
            const githubPr = document.getElementById('github_pr').value;

            // Reset UI
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            loader.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            errorContainer.classList.add('hidden');

            try {
                const response = await fetch('/api/evaluate/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        jira_id: jiraId,
                        github_repo: githubRepo,
                        github_pr: githubPr
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Wait time out or server error.');
                }

                // Render Results
                renderResults(data);

            } catch (err) {
                errorText.textContent = err.message;
                errorContainer.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                loader.classList.add('hidden');
            }
        });

        function renderResults(data) {
            const container = document.getElementById('results-container');
            const eval = data.evaluation;
            
            // Handle parsing if evaluation comes back as string (in case JSON parsing failed in backend)
            let evaluationObj = eval;
            if (typeof eval === 'string') {
                try {
                    // Try extracting JSON from markdown block
                    const jsonMatch = eval.match(/\{[\s\S]*\}/);
                    if(jsonMatch) {
                        evaluationObj = JSON.parse(jsonMatch[0]);
                    } else {
                        evaluationObj = JSON.parse(eval);
                    }
                } catch(e) {
                    console.error("Could not parse LLM output", e);
                    evaluationObj = { verdict: "Unknown", reasoning: eval, evidence: [] };
                }
            }
            
            // 1. Verdict Color Styling
            const banner = document.getElementById('verdict-banner');
            const verdictText = document.getElementById('verdict-text');
            const verdictIcon = document.getElementById('verdict-icon');
            
            // Reset classes
            banner.className = 'rounded-xl shadow-md p-6 border-2 flex items-center justify-between';
            const v = (evaluationObj.verdict || "fail").toLowerCase();
            
            verdictText.textContent = evaluationObj.verdict;

            if (v.includes('pass')) {
                banner.classList.add('bg-green-50', 'border-green-200');
                verdictText.classList.add('text-green-700');
                verdictIcon.innerHTML = `<svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            } else if (v.includes('partial')) {
                banner.classList.add('bg-yellow-50', 'border-yellow-200');
                verdictText.classList.add('text-yellow-700');
                verdictIcon.innerHTML = `<svg class="w-12 h-12 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            } else {
                banner.classList.add('bg-red-50', 'border-red-200');
                verdictText.classList.add('text-red-700');
                verdictIcon.innerHTML = `<svg class="w-12 h-12 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            }

            // 2. Reasoning
            document.getElementById('reasoning-text').innerText = evaluationObj.reasoning || "No reasoning provided.";

            // 3. Metadata
            document.getElementById('meta-jira').textContent = data.ticket?.summary || data.ticket?.id || "N/A";
            document.getElementById('meta-pr-title').textContent = data.pr_summary?.title || "N/A";
            document.getElementById('meta-files-count').textContent = (data.pr_summary?.files_count || 0) + " files";

            // 4. Evidence List
            const evidenceList = document.getElementById('evidence-list');
            evidenceList.innerHTML = '';
            
            if (evaluationObj.evidence && evaluationObj.evidence.length > 0) {
                evaluationObj.evidence.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "bg-gray-50 rounded-lg p-4 border border-gray-200 hover:border-blue-300 transition-colors";
                    div.innerHTML = `
                        <div class="font-mono text-sm text-blue-700 font-semibold mb-2 flex items-center gap-2">
                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                            ${item.file}
                        </div>
                        <p class="text-gray-700 text-sm pl-6 border-l-2 border-blue-200">${item.comment}</p>
                    `;
                    evidenceList.appendChild(div);
                });
            } else {
                evidenceList.innerHTML = `<p class="text-gray-500 italic">No specific file evidence cited.</p>`;
            }

            container.classList.remove('hidden');
        }
    </script>
</body>
</html>
